<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f3;
    --color-background-tertiary: #eeede9;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #9a9994;
    --color-border-tertiary: rgba(26,26,24,0.12);
    --color-border-secondary: rgba(26,26,24,0.22);
    --color-border-primary: rgba(26,26,24,0.35);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2a2a28;
      --color-background-tertiary: #141412;
      --color-text-primary: #f0efe9;
      --color-text-secondary: #a8a7a0;
      --color-text-tertiary: #6a6963;
      --color-border-tertiary: rgba(240,239,233,0.1);
      --color-border-secondary: rgba(240,239,233,0.2);
      --color-border-primary: rgba(240,239,233,0.3);
    }
    .badge-long { background: #085041 !important; color: #9FE1CB !important; }
    .badge-short { background: #4A1B0C !important; color: #F0997B !important; }
    .badge-win { background: #173404 !important; color: #C0DD97 !important; }
    .badge-loss { background: #501313 !important; color: #F09595 !important; }
    .badge-open { background: #042C53 !important; color: #85B7EB !important; }
    .btn-danger:hover { background: #501313 !important; }
  }
  body { font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-tertiary); min-height: 100vh; }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  .nav { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .nav h1 { font-size: 18px; font-weight: 500; margin-right: auto; letter-spacing: -0.3px; }
  .nav-btn { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
  .nav-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .nav-btn:hover:not(.active) { background: var(--color-background-secondary); }
  .page { display: none; }
  .page.active { display: block; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .stat-val.pos { color: #1D9E75; }
  .stat-val.neg { color: #E24B4A; }
  .btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border: none; padding: 8px 18px; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; font-weight: 500; font-family: var(--font-sans); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { background: transparent; border: 0.5px solid #E24B4A; color: #E24B4A; padding: 5px 12px; border-radius: var(--border-radius-md); font-size: 12px; cursor: pointer; font-family: var(--font-sans); }
  .btn-danger:hover { background: #FCEBEB; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .trade-row { display: grid; grid-template-columns: 80px 70px 60px 80px 80px 80px 1fr 90px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; cursor: pointer; }
  .trade-row:last-child { border-bottom: none; }
  .trade-row:hover { background: var(--color-background-secondary); margin: 0 -4px; padding-left: 4px; padding-right: 4px; border-radius: var(--border-radius-md); }
  .trade-header { display: grid; grid-template-columns: 80px 70px 60px 80px 80px 80px 1fr 90px; gap: 10px; padding: 0 0 8px; border-bottom: 0.5px solid var(--color-border-secondary); font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-long { background: #E1F5EE; color: #0F6E56; }
  .badge-short { background: #FAECE7; color: #993C1D; }
  .badge-win { background: #EAF3DE; color: #3B6D11; }
  .badge-loss { background: #FCEBEB; color: #A32D2D; }
  .badge-open { background: #E6F1FB; color: #185FA5; }
  .badge-breakeven { background: #FAEEDA; color: #854F0B; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--color-text-secondary); }
  .form-group input, .form-group select, .form-group textarea {
    font-size: 13px; border-radius: var(--border-radius-md);
    background: var(--color-background-primary); color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary); padding: 8px 10px;
    font-family: var(--font-sans); outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--color-border-primary); box-shadow: 0 0 0 2px rgba(26,26,24,0.06);
  }
  .form-group textarea { min-height: 70px; resize: vertical; }
  .form-group input[type="range"] { padding: 4px 0; border: none; background: transparent; }
  .section-title { font-size: 14px; font-weight: 500; margin: 1.25rem 0 0.75rem; color: var(--color-text-secondary); border-top: 0.5px solid var(--color-border-tertiary); padding-top: 1rem; }
  .section-title:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  .img-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .img-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
  .img-thumb:hover { opacity: 0.8; }
  .detail-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-start; justify-content: center; z-index: 999; padding: 2rem 1rem; overflow-y: auto; }
  .detail-box { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 1.5rem; max-width: 680px; width: 100%; border: 0.5px solid var(--color-border-tertiary); margin: auto; }
  .detail-box h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .close-btn { background: transparent; border: none; cursor: pointer; font-size: 18px; color: var(--color-text-secondary); padding: 0 4px; }
  .close-btn:hover { color: var(--color-text-primary); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; font-size: 13px; }
  .detail-item { padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .detail-item .lbl { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
  .detail-item .val { font-weight: 500; }
  .pairs-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .bar-track { flex: 1; height: 6px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; }
  .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: var(--border-radius-md); }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 14px; }
  .empty-state p { margin-top: 6px; font-size: 13px; }
  .tag { display: inline-block; font-size: 11px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 20px; padding: 2px 8px; color: var(--color-text-secondary); margin: 2px; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .filter-bar select { font-size: 12px; padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
  .notes-block { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 13px; line-height: 1.6; margin-top: 6px; color: var(--color-text-secondary); }
  .upload-zone { border: 1px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px; text-align: center; font-size: 13px; color: var(--color-text-tertiary); cursor: pointer; }
  .upload-zone:hover { background: var(--color-background-secondary); }
  .pnl-pos { color: #1D9E75; font-weight: 500; }
  .pnl-neg { color: #E24B4A; font-weight: 500; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  @media (max-width: 700px) {
    .form-grid.cols3 { grid-template-columns: 1fr 1fr; }
    .trade-row, .trade-header { grid-template-columns: 70px 65px 55px 70px 1fr 70px; }
    .trade-row > span:nth-child(4), .trade-header > span:nth-child(4) { display: none; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="nav">
    <h1>📈 Trading Journal</h1>
    <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('log')">Trade Log</button>
    <button class="nav-btn" onclick="showPage('analytics')">Analytics</button>
    <button class="nav-btn" onclick="showPage('add')">+ New Trade</button>
  </div>

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page active">
    <div class="stats-grid" id="stats-grid"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:10px;">Recent trades</div>
        <div id="recent-list"></div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:10px;">Top pairs by win rate</div>
        <div id="top-pairs-list"></div>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div id="page-log" class="page">
    <div class="filter-bar">
      <select id="filter-pair" onchange="renderLog()"><option value="">All pairs</option></select>
      <select id="filter-dir" onchange="renderLog()"><option value="">Long & Short</option><option value="long">Long</option><option value="short">Short</option></select>
      <select id="filter-status" onchange="renderLog()"><option value="">All statuses</option><option value="win">Win</option><option value="loss">Loss</option><option value="open">Open</option><option value="breakeven">Breakeven</option></select>
      <button class="nav-btn" onclick="showPage('add')" style="margin-left:auto;">+ New Trade</button>
    </div>
    <div class="card" style="overflow-x:auto;">
      <div class="trade-header">
        <span>Date</span><span>Pair</span><span>Dir</span><span>Entry</span><span>SL / TP</span><span>PNL</span><span>Status</span><span></span>
      </div>
      <div id="log-list"></div>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div id="page-analytics" class="page">
    <div class="stats-grid" id="analytics-stats"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
      <div class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:12px;">Pair performance</div>
        <div id="pair-perf"></div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:500;margin-bottom:12px;">Session breakdown</div>
        <div id="session-perf"></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:12px;">Cumulative PNL</div>
      <canvas id="pnl-chart" height="100"></canvas>
    </div>
  </div>

  <!-- ADD TRADE -->
  <div id="page-add" class="page">
    <div class="card">
      <p class="section-title">Trade details</p>
      <div class="form-grid cols3">
        <div class="form-group">
          <label>Pair *</label>
          <input id="f-pair" placeholder="EUR/USD" list="pairs-list">
          <datalist id="pairs-list">
            <option value="EUR/USD"><option value="GBP/USD"><option value="USD/JPY">
            <option value="AUD/USD"><option value="USD/CAD"><option value="NZD/USD">
            <option value="EUR/GBP"><option value="USD/CHF"><option value="BTC/USD">
            <option value="ETH/USD"><option value="XAU/USD"><option value="US30">
            <option value="NAS100"><option value="SPX500">
          </datalist>
        </div>
        <div class="form-group"><label>Direction *</label><select id="f-dir"><option value="long">Long</option><option value="short">Short</option></select></div>
        <div class="form-group"><label>Session</label><select id="f-session"><option value="">—</option><option value="london">London</option><option value="new_york">New York</option><option value="asian">Asian</option><option value="overlap">London/NY Overlap</option></select></div>
      </div>
      <div class="form-grid cols3" style="margin-top:12px;">
        <div class="form-group"><label>Entry price *</label><input id="f-entry" type="number" step="any" placeholder="1.0850"></div>
        <div class="form-group"><label>Stop loss *</label><input id="f-sl" type="number" step="any" placeholder="1.0800"></div>
        <div class="form-group"><label>Take profit</label><input id="f-tp" type="number" step="any" placeholder="1.0950"></div>
      </div>
      <div class="form-grid cols3" style="margin-top:12px;">
        <div class="form-group"><label>Entry time</label><input id="f-time" type="datetime-local"></div>
        <div class="form-group"><label>Position size (lots)</label><input id="f-size" type="number" step="any" placeholder="0.10"></div>
        <div class="form-group"><label>Risk amount ($)</label><input id="f-risk" type="number" step="any" placeholder="50"></div>
      </div>

      <p class="section-title">Setup & reason for entry</p>
      <div class="form-group"><label>Why did you enter?</label><textarea id="f-reason" placeholder="Describe your setup, confluences, pattern, indicator signal…"></textarea></div>
      <div class="form-group" style="margin-top:10px;"><label>Timeframe(s)</label><input id="f-tf" placeholder="15m, 1H, 4H"></div>
      <div class="form-group" style="margin-top:10px;"><label>Tags</label><input id="f-tags" placeholder="breakout, trend, fib, news, revenge…"></div>

      <p class="section-title">Trade outcome</p>
      <div class="form-grid cols3">
        <div class="form-group"><label>Exit price</label><input id="f-exit" type="number" step="any" placeholder="Leave blank if open"></div>
        <div class="form-group"><label>PNL ($)</label><input id="f-pnl" type="number" step="any" placeholder="Auto or manual"></div>
        <div class="form-group"><label>Status</label><select id="f-status"><option value="open">Open</option><option value="win">Win</option><option value="loss">Loss</option><option value="breakeven">Breakeven</option></select></div>
      </div>
      <div class="form-group" style="margin-top:12px;"><label>Closed early?</label><select id="f-early"><option value="no">No</option><option value="yes">Yes – moved to BE</option><option value="partial">Partial close</option><option value="stopped">Stopped out early</option></select></div>
      <div class="form-group" style="margin-top:10px;"><label>Early close reason</label><textarea id="f-early-reason" placeholder="Why did you exit early? Fear, news event, target revised…" style="min-height:55px;"></textarea></div>

      <p class="section-title">Post-trade review</p>
      <div class="form-group"><label>What went well?</label><textarea id="f-well" placeholder="Patience, followed the plan, good entry timing…"></textarea></div>
      <div class="form-group" style="margin-top:10px;"><label>What could be improved?</label><textarea id="f-improve" placeholder="Sized too big, moved SL, entered too early…"></textarea></div>
      <div class="form-group" style="margin-top:10px;"><label>Emotional state (1–10, 10=calm)</label><div style="display:flex;align-items:center;gap:10px;"><input id="f-emotion" type="range" min="1" max="10" value="7" style="flex:1"><span id="emotion-out" style="font-size:13px;color:var(--color-text-secondary);min-width:30px;">7</span></div></div>
      <div class="form-group" style="margin-top:10px;"><label>Confidence at entry (1–10)</label><div style="display:flex;align-items:center;gap:10px;"><input id="f-conf" type="range" min="1" max="10" value="7" style="flex:1"><span id="conf-out" style="font-size:13px;color:var(--color-text-secondary);min-width:30px;">7</span></div></div>
      <div class="form-group" style="margin-top:10px;"><label>Grade this trade</label><select id="f-grade"><option value="">—</option><option value="A">A — Textbook execution</option><option value="B">B — Good, minor issues</option><option value="C">C — Okay, needs work</option><option value="D">D — Poor, violated rules</option><option value="F">F — Should not have taken</option></select></div>

      <p class="section-title">Screenshots</p>
      <div class="upload-zone" onclick="document.getElementById('img-input').click()">Click to add chart screenshots (PNG, JPG)</div>
      <input type="file" id="img-input" multiple accept="image/*" style="display:none" onchange="handleImages(event)">
      <div class="img-preview" id="img-preview"></div>

      <div style="margin-top:1.5rem;display:flex;gap:10px;align-items:center;">
        <button class="btn-primary" onclick="saveTrade()">Save trade</button>
        <button class="nav-btn" onclick="clearForm()">Clear</button>
        <span id="save-msg" style="font-size:13px;color:#1D9E75;display:none;">✓ Saved!</span>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" style="display:none;" class="detail-modal" onclick="closeModal(event)">
  <div class="detail-box" id="detail-content" onclick="event.stopPropagation()"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none;" class="lightbox" onclick="this.style.display='none'">
  <img id="lb-img" src="" alt="Chart screenshot">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
let trades = [];
let tempImages = [];
let pnlChart = null;

// Persist to localStorage
function loadTrades() {
  try {
    const saved = localStorage.getItem('trading_journal_trades');
    if (saved) trades = JSON.parse(saved);
  } catch(e) { trades = []; }
  renderAll();
}

function saveTrades() {
  try { localStorage.setItem('trading_journal_trades', JSON.stringify(trades)); } catch(e) {}
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  const idx = ['dashboard','log','analytics','add'].indexOf(p);
  document.querySelectorAll('.nav-btn')[idx]?.classList.add('active');
  if (p === 'dashboard') renderDashboard();
  if (p === 'log') { populateFilterPairs(); renderLog(); }
  if (p === 'analytics') renderAnalytics();
}

document.getElementById('f-emotion').addEventListener('input', e => document.getElementById('emotion-out').textContent = e.target.value);
document.getElementById('f-conf').addEventListener('input', e => document.getElementById('conf-out').textContent = e.target.value);

function handleImages(e) {
  const files = Array.from(e.target.files);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => { tempImages.push(ev.target.result); renderImagePreview(); };
    reader.readAsDataURL(f);
  });
  e.target.value = '';
}

function renderImagePreview() {
  document.getElementById('img-preview').innerHTML = tempImages.map((src,i) =>
    `<div style="position:relative;display:inline-block">
      <img src="${src}" class="img-thumb" onclick="openLightbox('${src}')">
      <span onclick="removeImg(${i})" style="position:absolute;top:-4px;right:-4px;background:#E24B4A;color:white;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1">×</span>
    </div>`
  ).join('');
}

function removeImg(i) { tempImages.splice(i,1); renderImagePreview(); }
function openLightbox(src) { document.getElementById('lb-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }

function saveTrade() {
  const pair = document.getElementById('f-pair').value.trim().toUpperCase();
  const entry = parseFloat(document.getElementById('f-entry').value);
  if (!pair || isNaN(entry)) { alert('Pair and Entry price are required.'); return; }
  const sl = parseFloat(document.getElementById('f-sl').value) || null;
  const tp = parseFloat(document.getElementById('f-tp').value) || null;
  let rr = null;
  if (sl && tp) {
    const slDist = Math.abs(entry - sl);
    const tpDist = Math.abs(tp - entry);
    if (slDist > 0) rr = (tpDist / slDist).toFixed(2);
  }
  const trade = {
    id: Date.now(),
    pair,
    dir: document.getElementById('f-dir').value,
    entry,
    sl, tp, rr,
    exit: parseFloat(document.getElementById('f-exit').value) || null,
    pnl: parseFloat(document.getElementById('f-pnl').value) || null,
    status: document.getElementById('f-status').value,
    session: document.getElementById('f-session').value,
    time: document.getElementById('f-time').value || new Date().toISOString().slice(0,16),
    size: parseFloat(document.getElementById('f-size').value) || null,
    risk: parseFloat(document.getElementById('f-risk').value) || null,
    reason: document.getElementById('f-reason').value,
    tf: document.getElementById('f-tf').value,
    tags: document.getElementById('f-tags').value,
    early: document.getElementById('f-early').value,
    earlyReason: document.getElementById('f-early-reason').value,
    well: document.getElementById('f-well').value,
    improve: document.getElementById('f-improve').value,
    emotion: parseInt(document.getElementById('f-emotion').value),
    confidence: parseInt(document.getElementById('f-conf').value),
    grade: document.getElementById('f-grade').value,
    images: [...tempImages],
  };
  trades.unshift(trade);
  saveTrades();
  const msg = document.getElementById('save-msg');
  msg.style.display = 'inline';
  setTimeout(() => msg.style.display = 'none', 2500);
  clearForm();
}

function clearForm() {
  ['f-pair','f-entry','f-sl','f-tp','f-exit','f-pnl','f-reason','f-tf','f-tags','f-early-reason','f-well','f-improve','f-size','f-risk'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f-dir').value = 'long';
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-early').value = 'no';
  document.getElementById('f-session').value = '';
  document.getElementById('f-grade').value = '';
  document.getElementById('f-emotion').value = 7; document.getElementById('emotion-out').textContent = '7';
  document.getElementById('f-conf').value = 7; document.getElementById('conf-out').textContent = '7';
  tempImages = [];
  document.getElementById('img-preview').innerHTML = '';
}

function fmt(n) { if (n === null || n === undefined || isNaN(n)) return '—'; return (n >= 0 ? '+' : '') + '$' + parseFloat(n).toFixed(2); }
function fmtPct(n) { return (n*100).toFixed(1) + '%'; }
function dateStr(t) { return t ? t.slice(0,10) : '—'; }
function pnlClass(v) { return v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : ''; }

function renderDashboard() {
  const closed = trades.filter(t => t.status !== 'open');
  const wins = closed.filter(t => t.status === 'win');
  const losses = closed.filter(t => t.status === 'loss');
  const totalPnl = closed.reduce((s,t) => s + (t.pnl||0), 0);
  const wr = closed.length ? wins.length / closed.length : 0;
  const avgWin = wins.length ? wins.reduce((s,t) => s + (t.pnl||0), 0) / wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s,t) => s + (t.pnl||0), 0) / losses.length : 0;
  const pf = avgLoss < 0 ? (avgWin / Math.abs(avgLoss)).toFixed(2) : '∞';
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat"><div class="stat-label">Total PNL</div><div class="stat-val ${totalPnl>=0?'pos':'neg'}">${fmt(totalPnl)}</div></div>
    <div class="stat"><div class="stat-label">Win rate</div><div class="stat-val">${fmtPct(wr)}</div></div>
    <div class="stat"><div class="stat-label">Trades taken</div><div class="stat-val">${trades.length}</div></div>
    <div class="stat"><div class="stat-label">Profit factor</div><div class="stat-val">${pf}</div></div>
    <div class="stat"><div class="stat-label">Avg win</div><div class="stat-val pos">${avgWin ? fmt(avgWin) : '—'}</div></div>
    <div class="stat"><div class="stat-label">Avg loss</div><div class="stat-val neg">${avgLoss ? fmt(avgLoss) : '—'}</div></div>
  `;
  const recent = trades.slice(0,5);
  document.getElementById('recent-list').innerHTML = recent.length ? recent.map(t => `
    <div onclick="openDetail(${t.id})" style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;cursor:pointer;">
      <span style="font-weight:500">${t.pair}</span>
      <span class="badge badge-${t.dir}">${t.dir}</span>
      <span class="${pnlClass(t.pnl)}">${fmt(t.pnl)}</span>
      <span style="font-size:11px;color:var(--color-text-tertiary)">${dateStr(t.time)}</span>
    </div>`).join('') : '<div class="empty-state">No trades yet</div>';
  renderTopPairs('top-pairs-list');
}

function renderTopPairs(id) {
  const pairMap = {};
  trades.filter(t => t.status !== 'open').forEach(t => {
    if (!pairMap[t.pair]) pairMap[t.pair] = { wins:0, total:0, pnl:0 };
    pairMap[t.pair].total++;
    if (t.status === 'win') pairMap[t.pair].wins++;
    pairMap[t.pair].pnl += (t.pnl || 0);
  });
  const pairs = Object.entries(pairMap).sort((a,b) => (b[1].wins/b[1].total) - (a[1].wins/a[1].total)).slice(0,6);
  document.getElementById(id).innerHTML = pairs.length ? pairs.map(([pair,d]) => {
    const wr = d.wins / d.total;
    const color = wr >= 0.6 ? '#1D9E75' : wr >= 0.4 ? '#BA7517' : '#E24B4A';
    return `<div class="pairs-bar">
      <span style="min-width:70px;font-size:13px;font-weight:500">${pair}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${wr*100}%;background:${color}"></div></div>
      <span style="font-size:12px;color:var(--color-text-secondary);min-width:36px">${fmtPct(wr)}</span>
      <span style="font-size:12px;${pnlClass(d.pnl)}">${fmt(d.pnl)}</span>
    </div>`;
  }).join('') : '<div style="font-size:13px;color:var(--color-text-tertiary)">Close some trades first</div>';
}

function populateFilterPairs() {
  const sel = document.getElementById('filter-pair');
  const current = sel.value;
  const pairs = [...new Set(trades.map(t => t.pair))].sort();
  sel.innerHTML = '<option value="">All pairs</option>' + pairs.map(p => `<option value="${p}">${p}</option>`).join('');
  sel.value = current;
}

function renderLog() {
  const fp = document.getElementById('filter-pair').value;
  const fd = document.getElementById('filter-dir').value;
  const fs = document.getElementById('filter-status').value;
  const list = trades.filter(t => (!fp||t.pair===fp) && (!fd||t.dir===fd) && (!fs||t.status===fs));
  document.getElementById('log-list').innerHTML = list.length ? list.map(t => `
    <div class="trade-row" onclick="openDetail(${t.id})">
      <span style="color:var(--color-text-secondary)">${dateStr(t.time)}</span>
      <span style="font-weight:500">${t.pair}</span>
      <span><span class="badge badge-${t.dir}">${t.dir}</span></span>
      <span>${t.entry}</span>
      <span style="color:var(--color-text-tertiary);font-size:12px">${t.sl||'—'} / ${t.tp||'—'}</span>
      <span class="${pnlClass(t.pnl)}">${fmt(t.pnl)}</span>
      <span><span class="badge badge-${t.status}">${t.status}</span></span>
      <span><button class="btn-danger" onclick="event.stopPropagation();deleteTrade(${t.id})">Delete</button></span>
    </div>`).join('') : '<div class="empty-state"><b>No trades found</b><p>Add your first trade or adjust filters</p></div>';
}

function deleteTrade(id) {
  if (!confirm('Delete this trade?')) return;
  trades = trades.filter(t => t.id !== id);
  saveTrades(); renderLog(); renderDashboard();
}

function openDetail(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;
  const rr = t.rr ? `1:${t.rr}` : '—';
  document.getElementById('detail-content').innerHTML = `
    <h2>${t.pair} — ${t.dir.toUpperCase()} <button class="close-btn" onclick="document.getElementById('detail-modal').style.display='none'">✕</button></h2>
    <div class="detail-grid">
      <div class="detail-item"><div class="lbl">Date/time</div><div class="val">${(t.time||'').replace('T',' ')||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Session</div><div class="val">${t.session||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Entry</div><div class="val">${t.entry}</div></div>
      <div class="detail-item"><div class="lbl">Exit</div><div class="val">${t.exit||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Stop loss</div><div class="val">${t.sl||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Take profit</div><div class="val">${t.tp||'—'}</div></div>
      <div class="detail-item"><div class="lbl">R:R ratio</div><div class="val">${rr}</div></div>
      <div class="detail-item"><div class="lbl">Size (lots)</div><div class="val">${t.size||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Risk ($)</div><div class="val">${t.risk?'$'+t.risk:'—'}</div></div>
      <div class="detail-item"><div class="lbl">PNL</div><div class="val ${pnlClass(t.pnl)}">${fmt(t.pnl)}</div></div>
      <div class="detail-item"><div class="lbl">Status</div><div class="val">${t.status}</div></div>
      <div class="detail-item"><div class="lbl">Grade</div><div class="val">${t.grade||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Timeframes</div><div class="val">${t.tf||'—'}</div></div>
      <div class="detail-item"><div class="lbl">Closed early</div><div class="val">${t.early||'no'}</div></div>
    </div>
    ${t.reason?`<div style="margin-top:12px"><div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px">Entry reason</div><div class="notes-block">${t.reason}</div></div>`:''}
    ${t.earlyReason?`<div style="margin-top:10px"><div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px">Early close reason</div><div class="notes-block">${t.earlyReason}</div></div>`:''}
    ${t.well?`<div style="margin-top:10px"><div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px">What went well</div><div class="notes-block">${t.well}</div></div>`:''}
    ${t.improve?`<div style="margin-top:10px"><div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px">Improvements</div><div class="notes-block">${t.improve}</div></div>`:''}
    <div style="display:flex;gap:20px;margin-top:12px;font-size:13px;">
      <span>😌 Emotion: <b>${t.emotion}/10</b></span>
      <span>🎯 Confidence: <b>${t.confidence}/10</b></span>
    </div>
    ${t.tags?`<div class="chip-row">${t.tags.split(',').map(tag=>`<span class="tag">${tag.trim()}</span>`).join('')}</div>`:''}
    ${t.images?.length?`<div style="margin-top:14px"><div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">Screenshots (${t.images.length})</div><div class="img-preview">${t.images.map(src=>`<img src="${src}" class="img-thumb" onclick="openLightbox('${src}')">`).join('')}</div></div>`:''}
  `;
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeModal(e) {
  if (e.target === document.getElementById('detail-modal'))
    document.getElementById('detail-modal').style.display = 'none';
}

function renderAnalytics() {
  const closed = trades.filter(t => t.status !== 'open');
  const wins = closed.filter(t => t.status === 'win');
  const totalPnl = closed.reduce((s,t) => s+(t.pnl||0),0);
  const avgRR = closed.filter(t=>t.rr).reduce((s,t,_,a) => s + parseFloat(t.rr)/a.length, 0);
  const streak = getStreak();
  const avgEmotion = trades.length ? (trades.reduce((s,t)=>s+t.emotion,0)/trades.length).toFixed(1) : '—';
  document.getElementById('analytics-stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total PNL</div><div class="stat-val ${totalPnl>=0?'pos':'neg'}">${fmt(totalPnl)}</div></div>
    <div class="stat"><div class="stat-label">Win rate</div><div class="stat-val">${closed.length?fmtPct(wins.length/closed.length):'—'}</div></div>
    <div class="stat"><div class="stat-label">Avg R:R</div><div class="stat-val">${avgRR?'1:'+avgRR.toFixed(2):'—'}</div></div>
    <div class="stat"><div class="stat-label">Current streak</div><div class="stat-val ${streak.type==='win'?'pos':'neg'}">${streak.count} ${streak.type}</div></div>
    <div class="stat"><div class="stat-label">Avg emotion</div><div class="stat-val">${avgEmotion}/10</div></div>
    <div class="stat"><div class="stat-label">Closed trades</div><div class="stat-val">${closed.length}</div></div>
  `;
  renderTopPairs('pair-perf');
  const sessions = {};
  closed.forEach(t => {
    const s = t.session || 'unknown';
    if (!sessions[s]) sessions[s] = {wins:0,total:0,pnl:0};
    sessions[s].total++;
    if (t.status==='win') sessions[s].wins++;
    sessions[s].pnl += (t.pnl||0);
  });
  document.getElementById('session-perf').innerHTML = Object.keys(sessions).length ?
    Object.entries(sessions).map(([s,d]) => {
      const wr = d.wins/d.total;
      const color = wr>=0.6?'#1D9E75':wr>=0.4?'#BA7517':'#E24B4A';
      return `<div class="pairs-bar">
        <span style="min-width:90px;font-size:13px;font-weight:500;text-transform:capitalize">${s.replace('_',' ')}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${wr*100}%;background:${color}"></div></div>
        <span style="font-size:12px;color:var(--color-text-secondary);min-width:36px">${fmtPct(wr)}</span>
        <span style="font-size:12px;${pnlClass(d.pnl)}">${fmt(d.pnl)}</span>
      </div>`;
    }).join('') : '<div style="font-size:13px;color:var(--color-text-tertiary)">No session data yet</div>';
  renderPnlChart(closed);
}

function getStreak() {
  const closed = trades.filter(t => t.status !== 'open');
  if (!closed.length) return { count:0, type:'—' };
  let count = 1; const first = closed[0].status;
  for (let i=1; i<closed.length; i++) { if (closed[i].status===first) count++; else break; }
  return { count, type: first };
}

function renderPnlChart(closed) {
  if (pnlChart) { pnlChart.destroy(); pnlChart = null; }
  const sorted = [...closed].sort((a,b) => (a.time||'').localeCompare(b.time||''));
  let cum = 0;
  const labels = sorted.map((_,i) => i+1);
  const data = sorted.map(t => { cum += (t.pnl||0); return parseFloat(cum.toFixed(2)); });
  if (!data.length) { document.getElementById('pnl-chart').closest('.card').querySelector('canvas').insertAdjacentHTML('beforebegin','<p style="font-size:13px;color:var(--color-text-tertiary);padding:1rem 0">No closed trades yet</p>'); return; }
  const ctx = document.getElementById('pnl-chart').getContext('2d');
  const lineColor = data[data.length-1] >= 0 ? '#1D9E75' : '#E24B4A';
  pnlChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ data, borderColor: lineColor, borderWidth: 1.5, pointRadius: 3, pointBackgroundColor: lineColor, fill: false, tension: 0.3 }] },
    options: { plugins:{legend:{display:false}}, scales:{ x:{ticks:{font:{size:11}},grid:{display:false}}, y:{ticks:{font:{size:11},callback:v=>'$'+v},grid:{color:'rgba(128,128,128,0.1)'}} } }
  });
}

function renderAll() { renderDashboard(); }
loadTrades();
</script>
</body>
</html>
