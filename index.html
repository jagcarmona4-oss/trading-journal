<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
<style>
  /* (All your original CSS remains unchanged - omitted here for brevity) */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f3;
    --color-background-tertiary: #eeede9;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #9a9994;
    --color-border-tertiary: rgba(26,26,24,0.12);
    --color-border-secondary: rgba(26,26,24,0.22);
    --color-border-primary: rgba(26,26,24,0.35);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  /* ... rest of your original styles (dark mode, etc.) are unchanged ... */
  .btn-edit { background: transparent; border: 0.5px solid #1D9E75; color: #1D9E75; padding: 5px 12px; border-radius: var(--border-radius-md); font-size: 12px; cursor: pointer; font-family: var(--font-sans); }
  .btn-edit:hover { background: #E1F5EE; }
</style>
</head>
<body>

<!-- (All your HTML structure remains the same until the script) -->

<div class="app">
  <!-- ... your existing nav, pages, etc. ... (unchanged) -->

  <div id="page-log" class="page">
    <div class="filter-bar">
      <select id="filter-pair" onchange="renderLog()"><option value="">All pairs</option></select>
      <select id="filter-dir" onchange="renderLog()"><option value="">Long & Short</option><option value="long">Long</option><option value="short">Short</option></select>
      <select id="filter-status" onchange="renderLog()"><option value="">All statuses</option><option value="win">Win</option><option value="loss">Loss</option><option value="open">Open</option><option value="breakeven">Breakeven</option></select>
      <button class="nav-btn" onclick="showPage('add')" style="margin-left:auto;">+ New Trade</button>
    </div>
    <div class="card" style="overflow-x:auto;">
      <div class="trade-header">
        <span>Date</span><span>Pair</span><span>Dir</span><span>Entry</span><span>SL / TP</span><span>PNL</span><span>Status</span><span></span>
      </div>
      <div id="log-list"></div>
    </div>
  </div>

  <!-- ... rest of your pages unchanged ... -->
</div>

<!-- Modals and toast unchanged -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const SUPABASE_URL = 'https://lxkqqewbhijidehyvnde.supabase.co';
const SUPABASE_KEY = 'sb_publishable_b1CQbtRRsaXM8uWQH3tfWw_xPINGdzw';
const API = SUPABASE_URL + '/rest/v1/trades';
const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

let trades = [];
let tempImages = [];
let pnlChart = null;
let editingId = null;   // ← New: tracks which trade is being edited

// ... your existing functions (setSyncStatus, showToast, fetchTrades, etc.) remain the same ...

async function upsertTrade(trade) {
  setSyncStatus('syncing', 'Saving…');
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: trade.id, data: trade })
    });
    if (!res.ok) throw new Error(await res.text());
    setSyncStatus('synced', 'Synced');
    return true;
  } catch(e) {
    setSyncStatus('error', 'Save failed');
    showToast('Save failed: ' + e.message);
    return false;
  }
}

// ... rest of your functions unchanged until saveTrade ...

async function saveTrade() {
  const pair = document.getElementById('f-pair').value.trim().toUpperCase();
  const entry = parseFloat(document.getElementById('f-entry').value);
  if (!pair || isNaN(entry)) { alert('Pair and Entry price are required.'); return; }

  const sl = parseFloat(document.getElementById('f-sl').value) || null;
  const tp = parseFloat(document.getElementById('f-tp').value) || null;
  let rr = null;
  if (sl && tp) {
    const slDist = Math.abs(entry - sl);
    const tpDist = Math.abs(tp - entry);
    if (slDist > 0) rr = (tpDist / slDist).toFixed(2);
  }

  const trade = {
    id: editingId || Date.now(),
    pair, 
    entry, 
    sl, 
    tp, 
    rr,
    dir: document.getElementById('f-dir').value,
    exit: parseFloat(document.getElementById('f-exit').value) || null,
    pnl: parseFloat(document.getElementById('f-pnl').value) || null,
    status: document.getElementById('f-status').value,
    session: document.getElementById('f-session').value,
    time: document.getElementById('f-time').value || new Date().toISOString().slice(0, 16),
    size: parseFloat(document.getElementById('f-size').value) || null,
    risk: parseFloat(document.getElementById('f-risk').value) || null,
    reason: document.getElementById('f-reason').value,
    tf: document.getElementById('f-tf').value,
    tags: document.getElementById('f-tags').value,
    early: document.getElementById('f-early').value,
    earlyReason: document.getElementById('f-early-reason').value,
    well: document.getElementById('f-well').value,
    improve: document.getElementById('f-improve').value,
    emotion: parseInt(document.getElementById('f-emotion').value),
    confidence: parseInt(document.getElementById('f-conf').value),
    grade: document.getElementById('f-grade').value,
    images: [...tempImages],
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = editingId ? 'Updating…' : 'Saving…';

  const ok = await upsertTrade(trade);
  
  btn.disabled = false;
  btn.textContent = editingId ? 'Update trade' : 'Save trade';

  if (ok) {
    if (editingId) {
      // Update existing trade
      const index = trades.findIndex(t => t.id === editingId);
      if (index !== -1) trades[index] = trade;
    } else {
      trades.unshift(trade);
    }
    
    showToast(editingId ? 'Trade updated successfully!' : 'Trade saved & synced!');
    clearForm();
    editingId = null;
    renderDashboard();
    renderLog();
    renderAnalytics();
  }
}

function clearForm() {
  editingId = null;
  document.getElementById('save-btn').textContent = 'Save trade';
  
  ['f-pair','f-entry','f-sl','f-tp','f-exit','f-pnl','f-reason','f-tf','f-tags','f-early-reason','f-well','f-improve','f-size','f-risk']
    .forEach(id => { document.getElementById(id).value = ''; });
  
  document.getElementById('f-dir').value = 'long';
  document.getElementById('f-status').value = 'open';
  document.getElementById('f-early').value = 'no';
  document.getElementById('f-session').value = '';
  document.getElementById('f-grade').value = '';
  document.getElementById('f-emotion').value = 7; 
  document.getElementById('emotion-out').textContent = '7';
  document.getElementById('f-conf').value = 7; 
  document.getElementById('conf-out').textContent = '7';
  
  tempImages = []; 
  document.getElementById('img-preview').innerHTML = '';
}

// New function: Load trade into form for editing
function editTrade(id) {
  const trade = trades.find(t => t.id === id);
  if (!trade) return;

  editingId = id;
  document.getElementById('save-btn').textContent = 'Update trade';

  document.getElementById('f-pair').value = trade.pair || '';
  document.getElementById('f-entry').value = trade.entry || '';
  document.getElementById('f-sl').value = trade.sl || '';
  document.getElementById('f-tp').value = trade.tp || '';
  document.getElementById('f-exit').value = trade.exit || '';
  document.getElementById('f-pnl').value = trade.pnl || '';
  document.getElementById('f-dir').value = trade.dir || 'long';
  document.getElementById('f-status').value = trade.status || 'open';
  document.getElementById('f-session').value = trade.session || '';
  document.getElementById('f-time').value = trade.time || '';
  document.getElementById('f-size').value = trade.size || '';
  document.getElementById('f-risk').value = trade.risk || '';
  document.getElementById('f-reason').value = trade.reason || '';
  document.getElementById('f-tf').value = trade.tf || '';
  document.getElementById('f-tags').value = trade.tags || '';
  document.getElementById('f-early').value = trade.early || 'no';
  document.getElementById('f-early-reason').value = trade.earlyReason || '';
  document.getElementById('f-well').value = trade.well || '';
  document.getElementById('f-improve').value = trade.improve || '';
  document.getElementById('f-emotion').value = trade.emotion || 7;
  document.getElementById('emotion-out').textContent = trade.emotion || 7;
  document.getElementById('f-conf').value = trade.confidence || 7;
  document.getElementById('conf-out').textContent = trade.confidence || 7;
  document.getElementById('f-grade').value = trade.grade || '';

  tempImages = trade.images ? [...trade.images] : [];
  renderImagePreview();

  showPage('add');
}

// Updated renderLog to include Edit button
function renderLog() {
  const fp = document.getElementById('filter-pair').value;
  const fd = document.getElementById('filter-dir').value;
  const fs = document.getElementById('filter-status').value;
  
  const list = trades.filter(t => 
    (!fp || t.pair === fp) && 
    (!fd || t.dir === fd) && 
    (!fs || t.status === fs)
  );

  document.getElementById('log-list').innerHTML = list.length ? list.map(t =>
    `<div class="trade-row" onclick="openDetail(${t.id})">
      <span style="color:var(--color-text-secondary)">${dateStr(t.time)}</span>
      <span style="font-weight:500">${t.pair}</span>
      <span><span class="badge badge-${t.dir}">${t.dir}</span></span>
      <span>${t.entry}</span>
      <span style="color:var(--color-text-tertiary);font-size:12px">${(t.sl || '—')} / ${(t.tp || '—')}</span>
      <span class="${pnlClass(t.pnl)}">${fmt(t.pnl)}</span>
      <span><span class="badge badge-${t.status}">${t.status}</span></span>
      <span style="display:flex;gap:6px;">
        <button class="btn-edit" onclick="event.stopPropagation();editTrade(${t.id})">Edit</button>
        <button class="btn-danger" onclick="event.stopPropagation();deleteTrade(${t.id})">Delete</button>
      </span>
    </div>`
  ).join('') : '<div class="empty-state"><b>No trades found</b><p>Add your first trade or adjust filters</p></div>';
}

// Optional: Add Edit button in detail modal too
function openDetail(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;

  // ... existing detail HTML generation ...

  let html = `<h2>${t.pair} — ${t.dir.toUpperCase()} 
    <button class="close-btn" onclick="document.getElementById('detail-modal').style.display='none'">✕</button>
  </h2>`;

  // ... rest of your detail content ...

  // Add Edit button at the bottom
  html += `
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="btn-edit" onclick="editTradeFromModal(${t.id})" style="flex:1;padding:10px;">✏️ Edit Trade</button>
      <button class="btn-danger" onclick="deleteTradeFromModal(${t.id})" style="flex:1;padding:10px;">Delete Trade</button>
    </div>`;

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-modal').style.display = 'flex';
}

function editTradeFromModal(id) {
  document.getElementById('detail-modal').style.display = 'none';
  editTrade(id);
}

function deleteTradeFromModal(id) {
  if (confirm('Delete this trade?')) {
    document.getElementById('detail-modal').style.display = 'none';
    deleteTrade(id);
  }
}

// ... rest of your original script (renderDashboard, renderAnalytics, init, etc.) remains unchanged ...

async function init() {
  await fetchTrades();
  document.getElementById('loading-overlay').style.display = 'none';
  renderDashboard();
}
init();
</script>
</body>
</html>
